run:
  service_name: sandbox-runner-opensandbox-kata-demo
  mode: stg
  run_id: ""
  attempt: 1
  sandbox_id: ""
  workspace_dir: ..
  artifact_dir: ../.sandbox-runner
  otlp_endpoint: http://127.0.0.1:4318
  deployment_environment: stg
  command:
    - go
    - test
    - ./...
  language: auto
  image: golang:1.24-alpine

phases:
  prepare:
    enabled: true
    timeout_sec: 120
  setup:
    enabled: true
    timeout_sec: 900
    network_profile: setup-online
  execute:
    enabled: true
    timeout_sec: 1800
    network_profile: execute-offline
  verify:
    enabled: true
    timeout_sec: 300
  collect:
    enabled: true
    timeout_sec: 180

telemetry:
  traces: true
  logs: true
  metrics: true
  log_line_max_bytes: 8192
  emit_stdout_events: true
  emit_stderr_events: true

collector:
  mode: require
  healthcheck_timeout_ms: 1000
  local_collector_config: otelcol.local.yaml

artifacts:
  upload: false
  object_prefix: sandbox-runner-runs/
  backend: local

execution:
  backend: opensandbox
  provider: opensandbox
  runtime_profile: kata

backend:
  kind: opensandbox

runtime:
  profile: kata

platform:
  target_os: linux
  target_arch: amd64
  run_mode: stg_opensandbox_k8s
  container_execution_mode: host-runner
  feature_gates:
    go_basic_runner: true
    go_manual_sdk: true
    go_autosdk_bridge: true
    obi_ebpf: true
    k8s_operator_go_inject: false
    local_docker_mode: false
    local_direct_mode: false
    stg_linux_mode: true

sandbox:
  image: golang:1.24-alpine
  entrypoint:
    - /bin/sh
    - -lc
  env: {}
  cpu: "2"
  memory: 4Gi

opensandbox:
  base_url: http://127.0.0.1:8080
  api_key: ""
  runtime: kubernetes
  network_mode: bridge
  create_timeout_sec: 120
  poll_interval_ms: 1000
  cleanup_mode: delete
  ttl_sec: 1800
  renew_on_long_run: true
  workspace_root: /workspace
  upload_strategy: tar
  download_strategy: tar

provider:
  prefer_opensandbox: true
  require_capabilities:
    - file_upload
    - stream_logs
    - runtime_profile
  fallback_order:
    - opensandbox
    - k8s

kata:
  enabled: true
  runtime_class_name: kata
  containerd_runtime: io.containerd.kata.v2
  require_hardware_virtualization: true
  fail_if_unavailable: true

devcontainer:
  cli_path: devcontainer
  workspace_folder: .
  config_path: ../.devcontainer/devcontainer.json
  mount_workspace_git_root: true
  remove_existing_container: false
  skip_post_create: false
  run_user_commands: true
  up_timeout_sec: 300
  exec_timeout_sec: 1800
  id_label_prefix: ai-sandbox-runner
  log_level: info
  cleanup_mode: delete

go:
  classify_commands: true
  detect_go_env: true
  manual_sdk_helper_enabled: true
  autosdk_bridge_enabled: true
  obi_enabled: true
  extra_env: {}
