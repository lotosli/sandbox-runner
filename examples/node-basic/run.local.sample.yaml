run:
  service_name: sandbox-runner-node-sample
  mode: local
  attempt: 1
  sandbox_id: local-node
  workspace_dir: .
  artifact_dir: .sandbox-runner
  otlp_endpoint: http://127.0.0.1:4318
  deployment_environment: local
  command:
    - node
    - app.js
    - execute
  language: auto

phases:
  prepare:
    enabled: true
    timeout_sec: 60
  setup:
    enabled: true
    timeout_sec: 180
    network_profile: setup-online
  execute:
    enabled: true
    timeout_sec: 120
    network_profile: execute-offline
  verify:
    enabled: true
    timeout_sec: 60
    smoke_command:
      - node
      - app.js
      - verify
    expected_artifacts:
      - artifacts/proof.json
  collect:
    enabled: true
    timeout_sec: 60

collector:
  mode: skip

execution:
  backend: direct
  provider: native
  runtime_profile: default

backend:
  kind: direct

runtime:
  profile: native

platform:
  run_mode: local_direct

sandbox:
  env: {}

provider:
  prefer_opensandbox: false
  require_capabilities: []
  fallback_order:
    - direct
