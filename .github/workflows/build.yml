name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build release-style binaries
        run: make dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-runner-dist
          path: |
            dist/sandbox-runner-*
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
